# Resource budget — 2 vCPU / 4 GB RAM / 40 GB SSD.
# Total reserved: ~2.8 GB RAM / ~2.2 CPU. Leaves ~1.2 GB for OS + Docker daemon.
#
# Images are built LOCALLY and loaded via SSH — the server never needs to run
# `docker build`. Update IMAGE_TAG in .env to pin a specific deployment.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Tuned for ~1 GB budget: 25% shared_buffers, low max_connections.
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=40
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-bedrock_forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.80'
          memory: 1024M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-forge}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '3'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      redis-server --save 60 1 --loglevel warning --requirepass
      ${REDIS_PASSWORD:?required} --maxmemory 256mb --maxmemory-policy
      noeviction
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 320M
        reservations:
          cpus: '0.05'
          memory: 128M
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '3'

  forge:
    # Image is built locally and loaded to the server — no build on server.
    # The IMAGE_TAG env var is set by deploy.sh (default: latest).
    image: bedrock-forge/forge:${IMAGE_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: .env
    volumes:
      - forge-backups:/tmp/forge-backups
      - forge-system-backups:/tmp/forge-system-backups
    environment:
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-bedrock_forge}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # Cap V8 heap to avoid OOM on 4 GB VPS.
      NODE_OPTIONS: '--max-old-space-size=768'
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1536M
        reservations:
          cpus: '0.30'
          memory: 384M
    ports:
      - '3001:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const http=require(''http''); const
          checks=[''http://localhost:3000/health'',''http://localhost:3001/worker/health''];
          Promise.all(checks.map(url=>new Promise((resolve,reject)=>{ const
          req=http.get(url,res=>{ res.resume();
          res.statusCode>=200&&res.statusCode<300 ? resolve() : reject(new
          Error(url+'' -> ''+res.statusCode)); });
          req.setTimeout(3000,()=>{req.destroy(new Error(url+'' timeout''));});
          req.on(''error'',reject); }))).then(()=>process.exit(0),err=>{
          console.error(err.message); process.exit(1); });"',
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 45s
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '3'

  web:
    # Image is built locally and loaded to the server — no build on server.
    image: bedrock-forge/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.15'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 32M
    ports:
      - '3002:80'
    depends_on:
      forge:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO /dev/null http://127.0.0.1/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '3'

volumes:
  postgres_data:
  redis_data:
  forge-backups:
  forge-system-backups:
