# Bedrock Forge Docker Compose
# Production deployment configuration

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: forge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-forge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-forge}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (Celery broker + cache)
  redis:
    image: redis:7-alpine
    container_name: forge-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: forge-api
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forge}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:3000}
      CHROME_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: forge-celery-worker
    command:
      celery -A forge.core.celery_app:celery_app worker --loglevel=info -Q
      default,backups,maintenance,monitoring
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forge}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CHROME_PATH: /usr/bin/chromium
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    container_name: forge-celery-beat
    command: celery -A forge.core.celery_app:celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-forge}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forge}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CHROME_PATH: /usr/bin/chromium
    depends_on:
      - redis
    restart: unless-stopped

  # React Dashboard
  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
      target: preview
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    container_name: forge-dashboard
    ports:
      - '3000:3000'
    restart: unless-stopped

  # Nginx Reverse Proxy (disabled when using aaPanel)
  # nginx:
  #   image: nginx:alpine
  #   container_name: forge-nginx
  #   ports:
  #     - '${HTTP_PORT:-80}:80'
  #     - '${HTTPS_PORT:-443}:443'
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - api
  #     - dashboard
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
