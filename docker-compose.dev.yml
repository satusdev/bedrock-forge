services:
  forge:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "pnpm --filter api dev & pnpm --filter worker dev & wait"
    environment:
      NODE_ENV: development

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "corepack enable && pnpm --filter web dev"
    ports:
      - '5173:5173'
    environment:
      VITE_API_BASE_URL: http://localhost:3000
