services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-bedrock_forge}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-forge}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      redis-server --save 60 1 --loglevel warning --requirepass
      ${REDIS_PASSWORD:?required}
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  forge:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "pnpm --filter api dev & pnpm --filter worker dev & wait"
    env_file: .env
    environment:
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "const http=require(''http''); const
          checks=[''http://localhost:3000/health'',''http://localhost:3001/worker/health''];
          Promise.all(checks.map(url=>new Promise((resolve,reject)=>{ const
          req=http.get(url,res=>{ res.resume();
          res.statusCode>=200&&res.statusCode<300 ? resolve() : reject(new
          Error(url+'' -> ''+res.statusCode)); });
          req.setTimeout(3000,()=>{req.destroy(new Error(url+'' timeout''));});
          req.on(''error'',reject); }))).then(()=>process.exit(0),err=>{
          console.error(err.message); process.exit(1); });"',
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  web:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "corepack enable && pnpm --filter web dev"
    ports:
      - '5173:5173'
    env_file: .env
    depends_on:
      - forge

volumes:
  postgres_data_dev:
  redis_data_dev:
